name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate library — Haxe ${{ matrix.haxe }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        haxe: ["4.3.6"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: ${{ matrix.haxe }}

      - name: Install dependencies
        run: |
          haxelib install lime   --quiet
          haxelib install openfl --quiet
          haxelib install flixel --quiet
          haxelib dev coolui ${{ github.workspace }}

      - name: Verify haxelib.json
        shell: bash
        run: |
          haxelib list | grep coolui
          echo "Library registered OK"

      - name: Verify all .hx files parse (syntax check)
        shell: bash
        run: |
          find coolui -name "*.hx" | while read f; do
            haxe --display "$f@0" -cp . -lib flixel -lib openfl -lib lime 2>/dev/null || true
          done
          echo "Syntax check done"
